apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  progressDeadlineSeconds: 60
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: {{ .Values.client.registry }}:{{ .Values.client.version }}
          imagePullPolicy: Always
          resources:
            limits:
              cpu: 50m
              memory: 80Mi
          ports:
            - name: http-web
              containerPort: 80
          env:
            # Overrides the version baked into the image at build time, so the running app reports the
            # actual deployed version. Must match the schema var in env.schema.js that the SPA reads
            # (Footer + Sentry release); the old VITE_CLIENT_VERSION was not in the schema and so was
            # silently dropped by docker-react, leaving the baked fallback in place.
            - name: VITE_QUIZLORD_VERSION
              value: {{ .Values.client.version | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.client.dopplerSecretName }}
      imagePullSecrets:
        - name: {{ .Values.docker.registrySecretName }}
