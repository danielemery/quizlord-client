# Runs linting on every pull request. (No unit tests yet — `npm test` is a stub — so unlike the API
# there is no test/coverage step here; add one once real tests exist.)
name: CI

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read

env:
  NODE_VERSION: 24.16.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure node
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install packages
        run: npm ci

      - name: Lint
        run: npm run lint

  # Validates the docker-react consumer setup (Dockerfile pin, index.html
  # script tag, env.schema.js, scripts). Its `dependencies` check also
  # asserts the client's zod pin matches docker-react's peerDependencies.zod.
  docker-react-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure node
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install packages
        run: npm ci

      - name: Check docker-react setup
        run: npx docker-react check
