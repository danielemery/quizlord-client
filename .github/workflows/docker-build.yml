# Builds the app and the Docker image on every pull request without pushing it, so a broken build or
# Dockerfile surfaces at PR time rather than on merge in release-candidate.yml. This also exercises
# `tsc` (via `npm run build`), so ci.yml stays lint-only.
name: Docker Build

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read

env:
  NODE_VERSION: 24.16.0

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install packages
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
